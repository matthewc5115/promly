<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create File in Codespaces</title>
</head>
<body>
<h1>Create a File</h1>
<label for="filename">File Name:</label>
<input type="text" id="filename" placeholder="Enter filename" /><br/><br/>
<label for="filecontent">Content:</label><br/>
<textarea id="filecontent" rows="20" cols="80" placeholder="Enter your text here..."></textarea><br/><br/>
<button onclick="submitFile()">Create File</button>

<script>
async function submitFile() {
  const filename = document.getElementById('filename').value;
  const content = document.getElementById('filecontent').value;

  const response = await fetch('/create-file', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ filename, content })
  });

  if (response.ok) {
    alert('File created successfully!');
  } else {
    alert('Error creating file.');
  }
}
</script>
</body>
</html>
